# Initialize the scimitar db to ready to use
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-setup-cm
  namespace: project
data:
  01-create-todo-table.sql: |
    CREATE TABLE IF NOT EXISTS todo
    (
        id      int GENERATED BY DEFAULT AS IDENTITY,
        action  varchar not null,
        created timestamp DEFAULT CURRENT_TIMESTAMP
    );
  02-alter-table-add-done-status.sql: |
    alter table todo add column if not exists done boolean default FALSE;
