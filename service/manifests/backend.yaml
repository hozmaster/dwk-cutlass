apiVersion: apps/v1
kind: Deployment
metadata:
  name: cutlass-backend
  namespace: project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cutlass-app
      tier: backend
  template:
    metadata:
      labels:
        app: cutlass-app
        tier: backend
    spec:
      containers:
        - name: cutlass-backend
          image: CUTLASS_BCK_IMAGE
          env:
            - name: BACKEND_PORT
              valueFrom:
                configMapKeyRef:
                  name: cutlass-config
                  key: backend_port
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: cutlass-config
                  key: db_host
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: cutlass-config
                  key: db_username
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: cutlass-config
                  key: db_name
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: cutlass-secret
                  key: db_password
          imagePullPolicy: IfNotPresent
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 20
            httpGet:
              port: 3010
              path: /healthZ
              scheme: HTTP
            successThreshold: 1
          livenessProbe:
            httpGet:
              port: 3010
              path: /healthZ
              scheme: HTTP
            initialDelaySeconds: 60
#      resources:
#        requests:
#          memory: "25Mi"
#          cpu: "250m"
#       limits:
#          cpu: "150m"
#          memory: "100Mi"
      restartPolicy: Always
